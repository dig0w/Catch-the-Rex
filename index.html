<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="shortcut icon" href="assets/rex.png">
    <title>Catch the Rex</title>
    <meta name="description" content="Pterodactyl Chase - a reverse replica of the hidden Chrome Dino game, where you hunt the T-Rex instead of escaping the desert.">

    <link rel="stylesheet" href="styles.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<body>
    <header>
        <h1>Catch the Rex</h1>
        <p>Press Space to start the game, use the arrows to control.</p>

    <main>
        <div class="runner-container" style="width: 600px; height: 150px;">
            <canvas id="runner-canvas" width="600" height="150"></canvas>
        </div>
    </main>

    <div style="font-family: 'Micro 5'; height: 0; width: 0; overflow: hidden;">Preload</div>
